name: Deploy dzenua

on:
  push:
    branches: [ main ]  # или master

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install deps
        working-directory: web-app
        run: |
          npm ci
          cd client && npm ci

      - name: Build client
        working-directory: web-app
        run: npm run build

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_KEY }}   # приватный ssh-ключ
          script: |
            cd /var/www/dzenua || mkdir -p /var/www/dzenua && cd /var/www/dzenua
            # первый раз — клонируем, дальше просто pull
            if [ ! -d .git ]; then
              git init
              git remote add origin https://github.com/jaguar4ik88/dzenua.git
              git fetch origin main
              git checkout -t origin/main
            else
              git pull origin main
            fi
            cd web-app
            npm ci
            cd client && npm ci && cd ..
            npm run build
            pm2 restart dzenua || pm2 start server.js --name dzenua
