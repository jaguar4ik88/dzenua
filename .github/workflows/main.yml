name: Deploy dzenua

on:
  push:
    branches: [ main ]  # или master

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.REMOTE_KEY }}
          port: 22
          script: |
            cd /home/rv596484/dzenua.online/www || exit 1

            # Жёстко обновляем код из GitHub (без конфликтов)
            git fetch origin main
            git reset --hard origin/main
            
            # Обновляем зависимости (только в корне и в client)
            npm ci
            cd client && npm ci && cd ..
            
            # Собираем фронт в корневой ./dist (после правки vite.config.js)
            npm run build
            
            # Перезапуск Node-сервера БЕЗ pm2
            # Останавливаем старый процесс, если был запущен нами ранее
            pkill -f "node server.js" || true
            
            # Запускаем новый экземпляр в фоне с нужными host/port
            nohup node server.js --port=3000 --host=127.1.0.31 > server.log 2>&1 &
